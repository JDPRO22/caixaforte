<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa Forte - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</head>
<body style="background-color: #121212; color: #fff; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <div style="background-color: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 360px;">
        <h2 style="margin-top: 0; text-align: center; color: #007bff;">Caixa Forte - Login</h2>
        <form id="form-login">
            <label style="display: block; margin-bottom: 5px;">E-mail</label>
            <input type="email" id="login-email" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #333; background-color: #2a2a2a; color: #fff; box-sizing: border-box;" required>
            
            <label style="display: block; margin-bottom: 5px;">Senha</label>
            <input type="password" id="login-senha" style="width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 4px; border: 1px solid #333; background-color: #2a2a2a; color: #fff; box-sizing: border-box;" required>
            
            <button type="submit" style="width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Entrar no Sistema</button>
        </form>
        <p style="text-align: center; margin-top: 20px; font-size: 14px;">Não tem uma conta? <a href="cadastro.html" style="color: #007bff; text-decoration: none;">Cadastre-se</a></p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('form-login').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const senha = document.getElementById('login-senha').value;

                try {
                    await login(email, senha);
                    window.location.href = 'index.html';
                } catch (error) {
                    alert('Erro no acesso: ' + error.message);
                }
            });
        });
    </script>
</body>
</html>
